<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#c8cdd8;overflow:hidden;height:100vh}
#header{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 20px;display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,rgba(10,14,26,1) 60%,rgba(10,14,26,0))}
#header h1{font-size:16px;color:#e2e8f0}
#header select{padding:6px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:13px}
#header .info{font-size:12px;color:#64748b}
#graph{width:100%;height:100%}
.node circle{stroke:#1e293b;stroke-width:2;cursor:pointer;transition:r .2s}
.node circle:hover{stroke:#3b82f6;stroke-width:3}
.node text{font-size:10px;fill:#94a3b8;pointer-events:none}
.edge{stroke:#1e293b;stroke-width:1;stroke-opacity:.6}
.edge:hover{stroke:#3b82f6;stroke-opacity:1}
.tooltip{position:absolute;padding:8px 14px;background:#1e293b;color:#e2e8f0;border-radius:6px;font-size:13px;pointer-events:none;opacity:0;z-index:100;max-width:260px;line-height:1.5;border:1px solid #334155}
.legend{position:absolute;bottom:20px;left:20px;display:flex;gap:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#94a3b8}
.legend-dot{width:10px;height:10px;border-radius:50%}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#64748b;font-size:14px}
</style>
</head>
<body>
<div id="header">
  <h1>🧠 知识图谱</h1>
  <select id="wikiSelect" onchange="loadGraph(this.value)">
    <option value="graph-guozi">国资Wiki (82节点/190边)</option>
    <option value="graph-yixue">医学Wiki (25节点/89边)</option>
    <option value="graph-hw">AI知识库 (44节点/130边)</option>
    <option value="graph-ai">AI大模型Wiki (0节点)</option>
  </select>
  <span class="info" id="stats"></span>
</div>
<div id="graph"></div>
<div class="tooltip" id="tooltip"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>概念</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>实体</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>对比</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>其他</div>
</div>
<div id="loading">加载中...</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
var colors={concepts:'#3b82f6',entities:'#22c55e',comparisons:'#f59e0b',queries:'#ef4444',raw:'#8b5cf6',root:'#64748b'};

function loadGraph(file){
  document.getElementById('loading').style.display='block';
  d3.select('#graph').selectAll('*').remove();
  fetch('/static/'+file+'.json').then(r=>r.json()).then(data=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('stats').textContent=data.nodes.length+'节点/'+data.edges.length+'边';
    render(data);
  });
}

function render(data){
  var W=window.innerWidth,H=window.innerHeight-50;
  var svg=d3.select('#graph').append('svg').attr('width',W).attr('height',H);
  var g=svg.append('g');
  var tooltip=d3.select('#tooltip');
  var zoom=d3.zoom().scaleExtent([.2,4]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);

  // Filter broken edges
  var nodeIds=new Set(data.nodes.map(n=>n.id));
  var validEdges=data.edges.filter(e=>nodeIds.has(e.source)&&nodeIds.has(e.target));
  var broken=data.edges.length-validEdges.length;
  document.getElementById('stats').textContent=data.nodes.length+'节点/'+validEdges.length+'边'+(broken?' (过滤'+broken+'断裂边)':'');
  var sim=d3.forceSimulation(data.nodes)
    .force('link',d3.forceLink(validEdges).id(d=>d.id).distance(80))
    .force('charge',d3.forceManyBody().strength(-200))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide().radius(20));

  var link=g.selectAll('.edge').data(validEdges).join('line').attr('class','edge');
  var node=g.selectAll('.node').data(data.nodes).join('g').attr('class','node')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

  node.append('circle').attr('r',d=>Math.min(12,3+data.edges.filter(e=>e.source===d.id||e.target===d.id).length*2))
    .attr('fill',d=>colors[d.group]||'#64748b');

  node.append('text').text(d=>d.label).attr('dx',14).attr('dy',4);

  node.on('mouseover',function(e,d){
    tooltip.style('opacity',1).html('<strong>'+d.label+'</strong><br><span style="color:#64748b">'+d.wiki+' · '+d.group+'</span><br><span style="color:#60a5fa;font-size:11px">点击跳转Wiki</span>')
      .style('left',e.pageX+12+'px').style('top',e.pageY-10+'px');
  }).on('mouseout',()=>tooltip.style('opacity',0))
    .on('click',(e,d)=>{
      var base={'国资Wiki':'/static/guozi-wiki.html','医学Wiki':'/static/yixue-wiki.html','AI大模型Wiki':'/static/ai-llm-wiki.html','AI知识库':'/static/wiki-v2.html'};
      window.open(base[d.wiki]+'?page='+d.page,'_blank');
    });

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>'translate('+d.x+','+d.y+')');
  });
}

loadGraph('graph-guozi');
</script>
</body>
</html>
