<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#c8cdd8;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:40px 20px}
h1{font-size:1.4em;color:#e2e8f0;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:24px}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:15px;outline:none}
.search-box input:focus{border-color:#3b82f6}
.search-box button{padding:12px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.result{margin-bottom:14px;padding:14px 16px;background:#0f1525;border-radius:8px;border-left:3px solid #1e293b}
.result .meta{font-size:12px;color:#64748b;margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap}
.result .meta .source{color:#60a5fa;font-weight:600}
.result .preview{font-size:14px;color:#94a3b8;line-height:1.7}
#count{font-size:13px;color:#64748b;margin-bottom:16px}
#loading,#empty{text-align:center;padding:40px;color:#64748b;font-size:14px}

/* History section */
.history-section{margin-top:40px;border-top:1px solid #1e293b;padding-top:24px}
.history-section h2{font-size:1.1em;color:#e2e8f0;margin-bottom:4px}
.history-section .sub{font-size:12px;color:#64748b;margin-bottom:16px}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #0f1525;font-size:14px}
.history-item .icon{font-size:16px;flex-shrink:0}
.history-item .name{flex:1;color:#c8cdd8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .chunks{color:#64748b;font-size:12px;white-space:nowrap}
.history-item .time{color:#475569;font-size:12px;white-space:nowrap}
</style>
</head>
<body>
<div class="container">
<h1>📚 知识库</h1>
<p class="sub">15,949 个文本块 · 搜索 + 导入记录</p>
<div class="search-box">
  <input id="q" type="text" placeholder="输入关键词搜索..." onkeydown="if(event.key==='Enter')search()">
  <button onclick="search()">搜索</button>
</div>
<div id="count"></div>
<div id="results"><div id="empty">输入关键词开始搜索</div></div>

<div class="history-section">
  <h2>📥 导入记录</h2>
  <p class="sub">最近导入的文件</p>
  <div id="history"><div id="loading" style="padding:20px">加载中...</div></div>
</div>
</div>
<script>
var BASE='http://192.168.40.5:8792';

function search(){
  var q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('results').innerHTML='<div id="loading">搜索中...</div>';
  document.getElementById('count').textContent='';
  fetch(BASE+'/search?q='+encodeURIComponent(q))
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.ok||!d.results.length){
        document.getElementById('results').innerHTML='<div id="empty">未找到相关内容</div>';
        return;
      }
      document.getElementById('count').textContent=d.results.length+' 条结果';
      var html='';
      d.results.forEach(function(r){
        html+='<div class="result">'
          +'<div class="meta"><span class="source">'+esc(r.source)+'</span><span>块 '+r.chunk+'</span><span>相关度 '+(r.score*100).toFixed(0)+'%</span></div>'
          +'<div class="preview">'+esc(r.preview)+'</div>'
          +'</div>';
      });
      document.getElementById('results').innerHTML=html;
    }).catch(function(e){
      document.getElementById('results').innerHTML='<div id="empty">连接失败</div>';
    });
}

function loadHistory(){
  fetch(BASE+'/history').then(function(r){return r.json()}).then(function(d){
    if(!d.ok||!d.history.length){
      document.getElementById('history').innerHTML='<div style="text-align:center;padding:20px;color:#64748b;font-size:14px">暂无导入记录。点侧栏「入库」按钮上传文件。</div>';
      return;
    }
    var html='';
    d.history.forEach(function(h){
      html+='<div class="history-item"><span class="icon">📄</span><span class="name" title="'+esc(h.filename)+'">'+esc(h.filename)+'</span><span class="chunks">'+h.chunks+' 块</span><span class="time">'+h.time+'</span></div>';
    });
    document.getElementById('history').innerHTML=html;
  }).catch(function(){
    document.getElementById('history').innerHTML='<div style="text-align:center;padding:20px;color:#64748b">加载失败</div>';
  });
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadHistory();
</script>
</body>
</html>
